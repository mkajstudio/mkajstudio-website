<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semak Tempahan | MKAJ Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } .font-serif { font-family: 'Playfair Display', serif; }</style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-black text-white p-4 shadow-xl">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="raya-2026.html" class="flex items-center gap-2">
                <i class="fas fa-camera text-amber-500 text-xl"></i>
                <span class="text-lg font-bold tracking-widest lowercase">mkajstudio<span class="text-amber-500">.co</span></span>
            </a>
            <a href="raya-2026.html" class="text-xs font-bold text-gray-400 hover:text-white border border-gray-700 px-3 py-1 rounded-lg uppercase transition">Keluar</a>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-lg">
        <div id="search-section">
            <div class="text-center mb-8">
                <h1 class="font-serif text-4xl text-slate-900 mb-2 font-black italic">Semak Tempahan</h1>
                <p class="text-sm text-slate-500 font-medium">Urus tempahan anda atau jana resit rasmi.</p>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 mb-8">
                <div class="flex bg-slate-100 p-1 rounded-2xl mb-6">
                    <button id="tabPhone" onclick="switchMode('phone')" class="flex-1 py-3 text-xs font-black rounded-xl bg-white shadow text-slate-800 transition uppercase">No. Telefon</button>
                    <button id="tabID" onclick="switchMode('id')" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-400 transition uppercase">Booking ID</button>
                </div>

                <div id="modePhone">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">No. Telefon</label>
                    <input type="tel" id="searchPhone" placeholder="Cth: 0123456789" class="w-full mt-2 p-4 border-2 border-slate-50 bg-slate-50 rounded-2xl outline-none focus:border-amber-500 focus:bg-white font-bold transition" oninput="this.value = this.value.replace(/\D/g, '')">
                </div>

                <div id="modeID" class="hidden">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">ID (Angka Sahaja)</label>
                    <div class="flex mt-2">
                        <span class="inline-flex items-center px-4 bg-slate-200 border-2 border-r-0 border-slate-200 rounded-l-2xl font-black text-slate-600 font-mono">RAYA-</span>
                        <input type="tel" id="searchID" placeholder="12345" class="w-full p-4 border-2 border-slate-50 bg-slate-50 rounded-r-2xl outline-none focus:border-amber-500 focus:bg-white font-bold tracking-widest transition" oninput="this.value = this.value.replace(/\D/g, '')">
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="clearSearch()" class="w-1/3 py-4 text-slate-400 font-bold text-xs uppercase tracking-widest">Padam</button>
                    <button onclick="submitSearch()" id="btnSearch" class="w-2/3 bg-amber-500 text-slate-900 py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-amber-400 transition">Cari</button>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-20"><i class="fas fa-circle-notch fa-spin text-4xl text-amber-500"></i></div>
        <div id="results" class="space-y-4"></div>
    </main>

    <!-- MODAL EDIT (V14.0 - LOCKED PACKAGE) -->
    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center shrink-0">
                <div>
                    <h2 class="text-xl font-black text-slate-800 uppercase">Ubah Slot</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">OrderID: <span id="e_id_display" class="text-blue-600 font-black"></span></p>
                </div>
                <button onclick="toggleEdit(false)" class="w-8 h-8 rounded-full bg-white border shadow-sm flex items-center justify-center hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-6 space-y-6 overflow-y-auto">
                <input type="hidden" id="e_orderID">
                
                <!-- PAKEJ (TEKS SAHAJA - TAK BOLEH TUKAR) -->
                <div class="bg-slate-900 p-5 rounded-2xl text-white shadow-lg">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Pakej Anda</label>
                    <p id="e_pkg_label" class="text-lg font-black text-amber-500 uppercase mt-1">...</p>
                </div>

                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Pilih Tema Baru</label>
                    <select id="e_theme" class="w-full p-2 bg-white rounded-lg mt-1 font-bold text-sm border-none outline-none shadow-sm" onchange="resetSlot()"></select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Tarikh</label>
                        <input type="date" id="e_date" class="w-full bg-transparent font-bold text-sm outline-none mt-1" onchange="resetSlot()">
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Masa Slot</label>
                        <select id="e_time" class="w-full bg-transparent font-bold text-sm outline-none mt-1" onchange="reCalc()"></select>
                    </div>
                </div>
                <div id="slot-loader" class="hidden text-center text-[10px] font-bold text-amber-600 animate-pulse">Menyemak slot...</div>

                <!-- 3. PAX (V15.0 - UI CLEAR) -->
                <div class="bg-slate-900 p-5 rounded-3xl space-y-4">
                    <!-- Dewasa -->
                    <div class="flex justify-between items-center text-white">
                        <div>
                            <p class="font-bold text-sm">Dewasa / Remaja</p>
                            <p id="e_pax_note" class="text-[9px] text-slate-400 uppercase font-bold mt-1"></p>
                        </div>
                        <div class="flex items-center gap-3 bg-white/10 p-1 rounded-full border border-white/10">
                            <button type="button" onclick="adjPax('adult',-1)" class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/40 font-bold">-</button>
                            <span id="e_adult" class="font-black text-lg w-4 text-center">1</span>
                            <button type="button" onclick="adjPax('adult',1)" class="w-8 h-8 rounded-full bg-amber-500 text-slate-900 font-bold hover:bg-amber-400">+</button>
                        </div>
                    </div>
                    <!-- Kanak-kanak (Dah tak kabur) -->
                    <div class="flex justify-between items-center text-white border-t border-white/5 pt-4">
                        <div>
                            <p class="font-bold text-sm">Kanak-kanak</p>
                            <p class="text-[9px] text-green-400 uppercase font-bold mt-1">Percuma (< 7 Thn)</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white/10 p-1 rounded-full border border-white/10">
                            <button type="button" onclick="adjPax('kid',-1)" class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/40 font-bold">-</button>
                            <span id="e_kid" class="font-black text-lg w-4 text-center">0</span>
                            <button type="button" onclick="adjPax('kid',1)" class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/40 font-bold">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-slate-900 flex justify-between items-center shrink-0">
                <div class="text-white">
                    <p class="text-[9px] font-black uppercase text-slate-400">Total Harga Baru</p>
                    <p class="text-3xl font-black text-yellow-500">RM <span id="e_total">0</span></p>
                </div>
                <button onclick="preConfirmUpdate()" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-8 py-4 rounded-2xl font-black text-xs shadow-lg uppercase tracking-widest transition">Kemaskini</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMATION -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-black/95 z-[60] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 text-center">
            <h3 class="text-xl font-black text-slate-900 mb-2 uppercase">Sahkan Perubahan?</h3>
            <div class="bg-slate-50 p-4 rounded-2xl border mb-6 space-y-2 text-left text-[11px] font-bold">
                <div class="flex justify-between border-b pb-1 mb-1"><span class="text-slate-400 uppercase">PAKEJ</span><span id="c_package">...</span></div>
                <div class="flex justify-between border-b pb-1 mb-1"><span class="text-slate-400 uppercase">TEMA</span><span id="c_theme">...</span></div>
                <div class="flex justify-between"><span class="text-slate-400 uppercase">SLOT</span><span id="c_slot">...</span></div>
                <div class="flex justify-between border-t pt-2 mt-2 font-black"><span class="text-slate-400 uppercase">TOTAL</span><span class="text-amber-600 text-sm" id="c_total">...</span></div>
            </div>
            <div class="flex gap-3">
                <button onclick="getEl('confirmModal').classList.add('hidden')" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-xs text-slate-400">BATAL</button>
                <button id="btnFinalSave" onclick="saveBookingUpdate()" class="flex-1 py-4 bg-black text-white rounded-2xl font-black text-xs shadow-xl uppercase">KEMASKINI</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="assets/js/data.js"></script>
    <script>
    const getEl = (id) => document.getElementById(id);
    const API_URL_API = "https://script.google.com/macros/s/AKfycbw-j1s4lBeTyeY4Euw6-iec2sZPNOdDlEdtfjeJPTc-T2yCOciUdpO1LQI1kvRcuykF/exec";
    const N8N_WEBHOOK_URL = "https://api.mkajstudio.com/webhook/mkaj-settle-balance";
    const SLOTS_LIST = ["09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30", "21:00", "21:30"];

    let currentItem = null;
    let allBookings = [];
    let currentPkgKey = "";
    let currentMode = 'phone';

    function switchMode(m) {
        currentMode = m;
        getEl('modePhone').classList.toggle('hidden', m !== 'phone');
        getEl('modeID').classList.toggle('hidden', m !== 'id');
        getEl('tabPhone').className = m === 'phone' ? 'flex-1 py-3 text-xs font-black rounded-xl bg-white shadow text-slate-800 transition uppercase' : 'flex-1 py-3 text-xs font-black rounded-xl text-slate-400 transition uppercase';
        getEl('tabID').className = m === 'id' ? 'flex-1 py-3 text-xs font-black rounded-xl bg-white shadow text-slate-800 transition uppercase' : 'flex-1 py-3 text-xs font-black rounded-xl text-slate-400 transition uppercase';
    }

    function clearSearch() { getEl('searchPhone').value=''; getEl('searchID').value=''; getEl('results').innerHTML=''; }
    function formatDisplayDate(dateStr) { if(!dateStr) return "-"; let d = new Date(dateStr); if(isNaN(d)) { const p = dateStr.split('/'); if(p.length===3) d = new Date(`${p[2]}-${p[1]}-${p[0]}`); } return d.toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' }); }

    async function submitSearch() {
        let q = "";
        if(currentMode==='phone') { q = getEl('searchPhone').value; if(!q || q.length < 10) return alert("Nombor telefon tidak sah."); }
        else { let id = getEl('searchID').value; if(!id) return alert("Masukkan ID."); q = "RAYA-"+id; }
        const btn = getEl('btnSearch'); const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> CARI...`;
        getEl('loader').classList.remove('hidden'); getEl('results').innerHTML='';
        try {
            const res = await fetch(`${API_URL_API}?action=check_my_booking&query=${encodeURIComponent(q)}`).then(r=>r.json());
            getEl('loader').classList.add('hidden'); btn.disabled = false; btn.innerHTML = "CARI";
            if(res.status==='success' && res.data.length > 0) { allBookings = res.data; renderResults(allBookings); }
            else alert("Tiada tempahan dijumpai.");
        } catch(e) { getEl('loader').classList.add('hidden'); btn.disabled = false; btn.innerHTML = "CARI"; alert("Ralat sambungan."); }
    }

    function renderResults(arr) {
        const box = getEl('results'); box.innerHTML = '';
        arr.sort((a,b) => new Date(a.Date)-new Date(b.Date));
        arr.forEach(item => {
            const status = (item.Status || "").trim().toLowerCase();
            const isCnl = status.includes('cancel') || status.includes('reject');
            const isFinish = ['finished', 'completed', 'shooting', 'arrived'].includes(status);
            const count = parseInt(item.EditCount)||0;
            const statusColor = isCnl ? "bg-red-100 text-red-600" : (status === 'confirmed' || status === 'arrived' || isFinish ? "bg-green-100 text-green-700" : "bg-yellow-100 text-yellow-700");

            let btns = "";
            if (isCnl) {
                btns = `<button onclick="this.closest('.card-box').remove()" class="w-full bg-slate-100 text-slate-400 py-3 rounded-xl font-bold text-[10px] uppercase transition hover:bg-slate-200">Tutup Paparan</button>`;
            } else {
                const canEdit = (status === 'pending' || status === 'confirmed' || status === 'arrived') && count < 2;
                const editBtn = canEdit ? `<button onclick="openEditModal('${item.OrderID}')" class="bg-amber-500 text-slate-900 py-3 rounded-xl font-black text-[10px] uppercase transition hover:bg-amber-400">Ubah Booking</button>` : '';
                const receiptBtn = status === 'pending' ? 
                    `<button onclick="resendWhatsApp('${item.OrderID}')" class="bg-slate-900 text-white py-3 rounded-xl font-black text-[10px] uppercase transition hover:bg-black">Hantar Konfirmasi</button>` : 
                    `<button onclick="handleN8N(this, '${item.OrderID}', 'customer_receipt')" class="bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase transition hover:bg-blue-700">Resit Rasmi</button>`;
                btns = `<div class="grid grid-cols-${editBtn ? '2' : '1'} gap-2">${receiptBtn}${editBtn}</div>`;
            }

            box.innerHTML += `
                <div class="card-box bg-white p-6 rounded-[2rem] shadow-lg border-l-8 ${isCnl ? 'border-red-500' : 'border-amber-500'} mb-4 relative transition hover:shadow-xl">
                    <div class="flex justify-between mb-4 text-left">
                        <div><span class="text-[10px] font-black text-slate-300 tracking-widest">#${item.OrderID}</span><span class="ml-2 ${statusColor} px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-tighter">${item.Status}</span></div>
                        <div class="text-right"><p class="text-xl font-black">${item.Time}</p><p class="text-[9px] font-bold text-slate-400 uppercase">${formatDisplayDate(item.Date)}</p></div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-xs font-bold text-slate-700 space-y-2 mb-4 text-left">
                        <div class="flex justify-between"><span>TEMA</span><span>${item.Theme}</span></div>
                        <div class="flex justify-between"><span>PAKEJ</span><span class="truncate w-2/3 text-right uppercase">${item.Package}</span></div>
                        <div class="flex justify-between font-black border-t pt-2 mt-2"><span>TOTAL</span><span class="text-amber-600">RM ${item.TotalPrice}</span></div>
                    </div>
                    ${btns}
                </div>`;
        });
    }

    async function openEditModal(id) {
        if (typeof rayaPackages === 'undefined') return alert("Data.js failed to load.");
        const item = allBookings.find(x => x.OrderID === id);
        if (!item) return alert("Ralat memori data.");
        currentItem = item;
        
        // Populate Fields
        getEl('e_orderID').value = item.OrderID;
        getEl('e_id_display').innerText = item.OrderID;
        getEl('e_pkg_label').innerText = item.Package;
        getEl('e_date').value = new Date(item.Date).toISOString().split('T')[0];

        const pkgName = item.Package.split(' (')[0].trim().toUpperCase();
        currentPkgKey = Object.keys(rayaPackages).find(k => rayaPackages[k].name.toUpperCase().startsWith(pkgName)) || 'pakej1';
        const config = rayaPackages[currentPkgKey];

        const themeSel = getEl('e_theme'); themeSel.innerHTML = "";
        const catType = config.strict ? 'mini' : 'standard';
        for (const [k, v] of Object.entries(rayaThemesDetail)) {
            if (v.type === catType) themeSel.add(new Option(v.title, v.title));
        }
        themeSel.value = item.Theme;

        getEl('e_adult').innerText = item.Pax.match(/(\d+)\s*Dewasa/)?.[1] || "1";
        getEl('e_kid').innerText = item.Pax.match(/(\d+)\s*Kanak/)?.[1] || "0";

        getEl('editModal').classList.remove('hidden');
        await resetSlot();
    }

    function reCalc() {
        const config = rayaPackages[currentPkgKey];
        const newA = parseInt(getEl('e_adult').innerText);
        const oldA = parseInt(currentItem.Pax.match(/(\d+)\s*Dewasa/)?.[1] || 1);
        let currentTotal = parseInt(currentItem.TotalPrice);
        let oldExtraCost = (!config.strict && oldA > config.baseAdult) ? (oldA - config.baseAdult) * 10 : 0;
        let pureAddonsCost = currentTotal - config.price - oldExtraCost;
        let newExtraCost = (!config.strict && newA > config.baseAdult) ? (newA - config.baseAdult) * 10 : 0;
        let finalPrice = config.price + pureAddonsCost + newExtraCost;
        getEl('e_total').innerText = Math.round(finalPrice);
        getEl('e_pax_note').innerText = config.desc;
    }

    async function resetSlot() {
        const dateVal = getEl('e_date').value; 
        const themeVal = getEl('e_theme').value;
        const timeSel = getEl('e_time'); 
        const loader = getEl('slot-loader');
            
        if(!dateVal || !themeVal) return;

        timeSel.innerHTML = '<option>Loading...</option>'; 
        loader.classList.remove('hidden');
            
        try {
            // Tembak API untuk check slot ikut Tema & Tarikh yang dipilih di dropdown
            const response = await fetch(`${API_URL_API}?action=check_slots&date=${dateVal}&theme=${encodeURIComponent(themeVal)}`);
            const result = await response.json();
                
            loader.classList.add('hidden'); 
            timeSel.innerHTML = '';
                
            const blocked = result.bookedSlotIds || [];
                
            SLOTS_LIST.forEach(slotTime => { 
                // Logik: Adakah ini slot asal saya? (Kena sama Tarikh, Masa & Tema)
                const isMyCurrentSlot = (
                    slotTime === currentItem.Time && 
                    dateVal === currentItem.Date.split('T')[0] && 
                    themeVal === currentItem.Theme
                );

                // Hanya tunjuk jika slot tak kena block, ATAU itu memang slot asal saya
                if (!blocked.includes(slotTime) && !blocked.includes(`${themeVal}_${slotTime}`) || isMyCurrentSlot) {
                    const opt = new Option(slotTime, slotTime);
                    if (isMyCurrentSlot) opt.selected = true;
                    timeSel.add(opt);
                }
            });

            if(timeSel.options.length === 0) {
                timeSel.innerHTML = '<option value="">Tiada Slot Kosong</option>';
            }

            reCalc(); // Kira semula harga jika ada perubahan
        } catch(e) { 
            getEl('slot-loader').classList.add('hidden'); 
            timeSel.innerHTML = '<option>Ralat Hubungan</option>'; 
        }
    }

    async function saveBookingUpdate() {
        const btn = getEl('btnFinalSave'); btn.disabled = true; btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>...`;
        const payload = {
            action: "customer_edit_booking", orderID: currentItem.OrderID,
            package: currentItem.Package, theme: getEl('e_theme').value,
            date: getEl('e_date').value, time: getEl('e_time').value,
            pax: `${getEl('e_adult').innerText} Dewasa, ${getEl('e_kid').innerText} Kanak-kanak`,
            addOns: currentItem.AddOns, totalPrice: getEl('e_total').innerText, frame: currentItem.Frame
        };
        await fetch(API_URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Berjaya dikemaskini!"); location.reload();
    }

    function preConfirmUpdate() {
        getEl('confirmModal').classList.remove('hidden');
        getEl('c_package').innerText = currentItem.Package;
        getEl('c_theme').innerText = getEl('e_theme').value;
        getEl('c_slot').innerText = `${getEl('e_date').value} @ ${getEl('e_time').value}`;
        getEl('c_total').innerText = "RM " + getEl('e_total').innerText;
    }

    window.handleN8N = async function(btn, id, type) {
        const b = allBookings.find(x => x.OrderID === id);
        const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i>...`;
        try {
            await fetch(N8N_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ trigger: type, orderID: b.OrderID, phone: b.Phone, nama: b.Name, tema: b.Theme, pax: b.Pax, totalPrice: b.TotalPrice, addOns: b.AddOns, frame: b.Frame }) });
            alert("Resit dihantar!");
        } catch (err) { alert("Ralat n8n."); } finally { btn.disabled = false; btn.innerHTML = originalText; }
    };

    function resendWhatsApp(id) {
        const i = allBookings.find(x => x.OrderID === id);
        const waMsg = `Hi MKAJ Studio! 👋\nSaya nak hantar semula butiran Booking Raya 2026 saya.\n\n🆔 *${i.OrderID}*\n👤 ${i.Name}\n📦 ${i.Package}\n🕌 ${i.Theme}\n📅 ${formatDisplayDate(i.Date)} @ ${i.Time}\n👥 *Pax:* ${i.Pax}\n🖼️ *Frame:* ${i.Frame}\n➕ *Add-ons:* ${i.AddOns}\n💰 *Total:* RM${i.TotalPrice}\n\nTerima kasih!`;
        window.open(`https://wa.me/60147299454?text=${encodeURIComponent(waMsg)}`, '_blank');
    }

    function toggleEdit(s) { getEl('editModal').classList.toggle('hidden', !s); }
    function adjPax(t, d) { const el = getEl(t === 'adult' ? 'e_adult' : 'e_kid'); let v = parseInt(el.innerText) + d; if (v < 0) v = 0; if (t === 'adult' && v < 1) v = 1; el.innerText = v; reCalc(); }
    window.onload = () => { switchMode('phone'); };
</script>
</body>
</html>
